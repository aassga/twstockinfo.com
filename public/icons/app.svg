<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <clipPath id="c">
      <rect x="2" y="2" width="60" height="60" rx="12"/>
    </clipPath>
  </defs>

  <!-- 背景方框 -->
  <rect x="2" y="2" width="60" height="60" rx="12" fill="#0d0618"/>

  <!-- 同心圓波紋 -->
  <circle cx="32" cy="32" r="27" fill="none" stroke="#3d1f6e" stroke-width="1"/>
  <circle cx="32" cy="32" r="23" fill="none" stroke="#4a2480" stroke-width="1"/>
  <circle cx="32" cy="32" r="19" fill="none" stroke="#6e36b0" stroke-width="1.2"/>
  <circle cx="32" cy="32" r="15" fill="none" stroke="#9855d4" stroke-width="1.4"/>
  <circle cx="32" cy="32" r="11" fill="none" stroke="#c98ee8" stroke-width="1.6"/>
  <circle cx="32" cy="32" r="7"  fill="none" stroke="#e0b0f5" stroke-width="1.8"/>

  <!-- 市場折線 -->
  <polyline
    points="5,42 12,34 18,38 24,28 30,32 36,22 42,26 50,16 58,20"
    fill="none" stroke="#d580ff" stroke-width="2"
    stroke-linejoin="round" stroke-linecap="round"
    clip-path="url(#c)"/>

  <!-- 折線節點光點 -->
  <circle cx="12" cy="34" r="1.5" fill="#d580ff" opacity="0.7" clip-path="url(#c)"/>
  <circle cx="24" cy="28" r="1.5" fill="#d580ff" opacity="0.7" clip-path="url(#c)"/>
  <circle cx="36" cy="22" r="1.5" fill="#d580ff" opacity="0.7" clip-path="url(#c)"/>
  <circle cx="50" cy="16" r="2"   fill="#ea80fc" opacity="0.9" clip-path="url(#c)"/>

  <!-- 中心上升三角 -->
  <polygon points="32,22 40,38 24,38" fill="#ea80fc"/>
  <line x1="32" y1="26" x2="32" y2="36" stroke="#0d0618" stroke-width="1.2" opacity="0.4"/>

  <!-- 外框 -->
  <rect x="2" y="2" width="60" height="60" rx="12" fill="none" stroke="#7c4dff" stroke-width="1.5"/>
</svg>
